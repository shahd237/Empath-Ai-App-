<ion-header>
  <ion-toolbar class="chat-header">

    <ion-title>Empath AI 🤖</ion-title>
    
    <button class="back-btn" (click)="goBack()">
    <ion-icon name="arrow-back-outline"></ion-icon>
   </button>

  </ion-toolbar>
</ion-header>

  </div>

     <!-- typing يظهر بعد آخر رسالة -->
   <!-- Bot Typing -->
<div class="message bot" *ngIf="isBotTyping">
  <div class="bubble typing-container">
    <div class="typing-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="typing-text">Typing</div>
  </div>
</div>

  </div>
</ion-content>


<ion-footer>
  <div class="input-bar" *ngIf="isCreateConversation">
    <ion-input
      placeholder="اكتب رسالتك هنا..."
      [(ngModel)]="UserInput"
      (ionInput)="onTyping()"
      clearInput
    >
    </ion-input>

    <!-- زر الإرسال -->
    <ion-button *ngIf="UserInput?.trim()" (click)="sendMessage()">
      <!--trim() function in JS if user write space return False in this case ngif userinput not space icon send show-->
      <ion-icon name="send" slot="icon-only"></ion-icon>
    </ion-button>

    <!-- زر المايك -->
    <ion-button
      *ngIf="!UserInput?.trim()"
      (click)="toggleRecording()"
      (mousedown)="startRecording()"
      (mouseup)="stopRecording()"
      (touchstart)="startRecording()"
      (touchend)="stopRecording()"
    >
      <!--trim()=> function in JS in this case if userinput write or not write space icon mic show-->

      <ion-icon
        name="mic"
        [name]="isRecording ? 'stop' : 'mic'"
        slot="icon-only"
        style="color: #fff"
      >
      </ion-icon>
    </ion-button>
  </div>
</ion-footer>
