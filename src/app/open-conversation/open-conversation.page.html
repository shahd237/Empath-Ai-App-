<ion-header>
  <ion-toolbar>
    <ion-title>{{ conversation?.title || 'Conversation' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="chat-page" padding>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    <ion-spinner name="dots"></ion-spinner>
  جاري تحميل المحادثة...
  </div>

  <!-- Error Message -->
  <div *ngIf="!loading && errorMessage" class="error">
    {{ errorMessage }}
  </div>
